  <ellipse cx="8" cy="5.5" rx="0.7" ry="0.8" fill="#2c1810"/>

  <!-- 眼睛高光 -->
  <circle cx="5.2" cy="5.2" r="0.3" fill="white"/>
  <circle cx="8.2" cy="5.2" r="0.3" fill="white"/>

